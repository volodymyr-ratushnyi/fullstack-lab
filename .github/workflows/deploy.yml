name: FullstackLab Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: yarn install
      - run: yarn workspaces foreach run build
      - uses: actions/upload-artifact@v7
        with:
          path: dist
      - uses: actions/
